<header class="page-header">

    @if (showBackButton()) {
    <button class="back-button" type="button" (click)="back()">

        <span class="material-symbols-outlined menu-item">
            chevron_backward
        </span>

    </button>
    } @else {
    <div class="back-button-placeholder"></div>
    }

    <div class="title" style="margin: auto;">
        <div> {{ title() }}</div>
    </div>

    <div class="back-button-placeholder"></div>

</header>
