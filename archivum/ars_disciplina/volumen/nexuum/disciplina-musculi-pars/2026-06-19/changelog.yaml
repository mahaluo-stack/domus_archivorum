databaseChangeLog:

  - changeSet:
      id: creata-tabula-disciplina-musculi-pars
      author: mhl

      changes:

        - createTable:
            schemaName: nexuum
            tableName: disciplina_musculi_pars

            columns:

              - column:
                  name: disciplinae_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_musculi_pars_clavis_primaria

              - column:
                  name: musculi_pars_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_musculi_pars_clavis_primaria

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP