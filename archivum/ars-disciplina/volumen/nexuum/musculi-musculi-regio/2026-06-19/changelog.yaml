            tableName: musculi_musculi_regio

            columns:

              - column:
                  name: musculi_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: musculi_musculi_regio_clavis_primaria

              - column:
                  name: musculi_regio_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: musculi_musculi_regio_clavis_primaria

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP