databaseChangeLog:

  - changeSet:
      id: creata-tabula-disciplina-lateralitates
      author: mhl

      changes:

        - createTable:
            schemaName: nexuum
            tableName: disciplina_lateralitates

            columns:

              - column:
                  name: disciplinae_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_lateralitates_clavis_primaria

              - column:
                  name: lateralis_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_lateralitates_clavis_primaria

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP