databaseChangeLog:

  - changeSet:
      id: creata-tabula-disciplina-genera-prehensionis
      author: mhl

      changes:

        - createTable:
            schemaName: nexuum
            tableName: disciplina_genera_prehensionis

            columns:

              - column:
                  name: disciplinae_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_genera_prehensionis_clavis_primaria

              - column:
                  name: genera_prehensionis_identitas
                  type: INTEGER

                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: disciplina_genera_prehensionis_clavis_primaria

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP