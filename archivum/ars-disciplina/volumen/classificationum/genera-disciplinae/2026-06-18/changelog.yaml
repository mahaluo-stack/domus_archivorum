databaseChangeLog:

  - changeSet:
      id: creata-tabula-genera-disciplinae
      author: mhl

      changes:

        - createTable:
            schemaName: classificationum
            tableName: genera_disciplinae

            columns:

              - column:
                  name: genera_disciplinae_identitas
                  type: INTEGER
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nomen_genus_disciplinae
                  type: VARCHAR(50)

                  constraints:
                    nullable: false

              - column:
                  name: descriptio
                  type: VARCHAR(4000)

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            schemaName: classificationum
            tableName: genera_disciplinae
            columnNames: nomen_genus_disciplinae
            constraintName: nomen_genus_disciplinae_unicum