databaseChangeLog:

  - changeSet:
      id: creata-tabula-musculi-regio
      author: mhl

      changes:

        - createTable:
            schemaName: musculorum
            tableName: musculi_regio

            columns:

              - column:
                  name: musculi_regio_identitas
                  type: INTEGER
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: nomen_musculi_regio
                  type: VARCHAR(50)

                  constraints:
                    nullable: false

              - column:
                  name: descriptio
                  type: VARCHAR(4000)

              - column:
                  name: creatio
                  type: TIMESTAMP(0)
                  defaultValueComputed: CURRENT_TIMESTAMP

        - addUniqueConstraint:
            schemaName: musculorum
            tableName: musculi_regio
            columnNames: nomen_musculi_regio
            constraintName: nomen_musculi_regio_unicum